services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    stop_grace_period: 30s
    labels:
      dev.nesoriel.update.policy: "manual"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
      WEBUI_PORT: ${QBITTORRENT_WEBUI_PORT:-8080}
      TORRENTING_PORT: ${QBITTORRENT_BT_PORT:-6881}
    volumes:
      - /data/docker/config/qbittorrent:/config

      # General download workspace
      - /data/downloads:/data/downloads

      # Media libraries that download managers may target
      - /data/media/anime:/data/media/anime
      - /data/media/movie:/data/media/movie
      - /data/media/manga:/data/media/manga
    ports:
      - "${QBITTORRENT_WEBUI_PORT:-8080}:${QBITTORRENT_WEBUI_PORT:-8080}"
      - "${QBITTORRENT_BT_PORT:-6881}:${QBITTORRENT_BT_PORT:-6881}/tcp"
      - "${QBITTORRENT_BT_PORT:-6881}:${QBITTORRENT_BT_PORT:-6881}/udp"
    networks:
      - homelab

networks:
  homelab:
    external: true
