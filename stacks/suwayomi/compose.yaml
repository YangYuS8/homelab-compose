services:
  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:latest
    container_name: suwayomi
    restart: unless-stopped
    labels:
      dev.nesoriel.update.policy: "notify"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,192.168.3.0/24,komga}
    volumes:
      - /data/docker/config/suwayomi:/home/suwayomi/.local/share/Tachidesk
      - /data/media/manga:/home/suwayomi/.local/share/Tachidesk/downloads
    ports:
      - "${SUWAYOMI_PORT:-4567}:4567"
    networks:
      - homelab

networks:
  homelab:
    external: true
