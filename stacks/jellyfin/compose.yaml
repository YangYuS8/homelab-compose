services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    labels:
      dev.nesoriel.update.policy: "manual"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}
      JELLYFIN_PublishedServerUrl: ${JELLYFIN_PUBLISHED_SERVER_URL:-http://192.168.3.30:8096}
    volumes:
      - /data/docker/config/jellyfin:/config
      - /data/docker/cache/jellyfin:/cache

      # Video media libraries, read-only for safety.
      - /data/media/anime:/data/media/anime:ro
      - /data/media/movie:/data/media/movie:ro
    ports:
      - "${JELLYFIN_HTTP_PORT:-8096}:8096"
      - "${JELLYFIN_DISCOVERY_PORT:-7359}:7359/udp"
      # DLNA / SSDP discovery. Disable this if port 1900/udp conflicts.
      - "${JELLYFIN_DLNA_PORT:-1900}:1900/udp"
    networks:
      - homelab

networks:
  homelab:
    external: true
