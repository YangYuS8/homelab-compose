services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    labels:
      dev.nesoriel.update.policy: "notify"
    environment:
      ND_LOGLEVEL: ${ND_LOGLEVEL:-info}
      ND_SCANSCHEDULE: ${ND_SCANSCHEDULE:-1h}
      ND_SESSIONTIMEOUT: ${ND_SESSIONTIMEOUT:-24h}
      ND_BASEURL: ${ND_BASEURL:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - /data/docker/config/navidrome:/data
      - /data/media/music:/music:ro
    ports:
      - "${NAVIDROME_PORT:-4533}:4533"
    networks:
      - homelab

networks:
  homelab:
    external: true
