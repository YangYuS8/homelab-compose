services:
  ani-rss:
    image: wushuo894/ani-rss:latest
    container_name: ani-rss
    restart: unless-stopped
    labels:
      dev.nesoriel.update.policy: "notify"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      UMASK: ${UMASK:-022}
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: ${ANI_RSS_PORT:-7789}
      CONFIG: /config
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      JAVA_OPTS: ${JAVA_OPTS:--Xms64m -Xmx512m -Xss256k -XX:+UseG1GC}
    volumes:
      - /data/docker/config/ani-rss:/config

      # Keep these paths consistent with qBittorrent.
      - /data/media/anime:/data/media/anime
      - /data/media/movie:/data/media/movie
    ports:
      - "${ANI_RSS_PORT:-7789}:${ANI_RSS_PORT:-7789}"
    networks:
      - homelab

networks:
  homelab:
    external: true
