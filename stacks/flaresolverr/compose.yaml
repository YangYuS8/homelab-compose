services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    privileged: true
    shm_size: "2gb"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-Asia/Shanghai}
      PROXY: ${FLARESOLVERR_PROXY:-}
    volumes:
      - /data/docker/config/flaresolverr:/config
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    networks:
      - homelab

networks:
  homelab:
    external: true
